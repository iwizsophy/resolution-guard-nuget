name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Validate manual workflow branch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            main|develop) ;;
            *)
              echo "Manual publish workflow runs are allowed only on main or develop." >&2
              exit 1
              ;;
          esac

      - name: Fetch target branches
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/develop:refs/remotes/origin/develop

      - name: Restore
        run: dotnet restore ResolutionGuard.NuGet.slnx

      - name: Build
        run: dotnet build ResolutionGuard.NuGet.slnx -c Release --no-restore

      - name: Install Syft
        shell: bash
        run: |
          set -euo pipefail
          version="v1.42.3"
          archive="syft_${version#v}_linux_amd64.tar.gz"
          expected_sha256="0d6be741479eddd2c8644a288990c04f3df0d609bbc1599a005532a9dff63509"
          archive_path="${RUNNER_TEMP}/${archive}"
          mkdir -p "${HOME}/.local/bin"
          curl -sSfL "https://github.com/anchore/syft/releases/download/${version}/${archive}" \
            -o "${archive_path}"
          printf '%s  %s\n' "${expected_sha256}" "${archive_path}" | sha256sum --check --
          tar -xzf "${archive_path}" -C "${RUNNER_TEMP}" syft
          install "${RUNNER_TEMP}/syft" "${HOME}/.local/bin/syft"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Determine publish settings
        id: publish_settings
        shell: bash
        run: |
          set -euo pipefail

          set_publish_target() {
            case "$1" in
              main)
                echo "source=https://api.nuget.org/v3/index.json" >> "${GITHUB_OUTPUT}"
                echo "audience=https://www.nuget.org" >> "${GITHUB_OUTPUT}"
                echo "token_service_url=https://www.nuget.org/api/v2/token" >> "${GITHUB_OUTPUT}"
                echo "target=nuget.org" >> "${GITHUB_OUTPUT}"
                echo "prerelease=false" >> "${GITHUB_OUTPUT}"
                echo "latest=true" >> "${GITHUB_OUTPUT}"
                ;;
              develop)
                # nugettest.org: feed(host=apiint) と OIDC token exchange(host=int) は別
                echo "source=https://apiint.nugettest.org/v3/index.json" >> "${GITHUB_OUTPUT}"
                echo "audience=https://int.nugettest.org" >> "${GITHUB_OUTPUT}"
                echo "token_service_url=https://int.nugettest.org/api/v2/token" >> "${GITHUB_OUTPUT}"
                echo "target=nugettest.org" >> "${GITHUB_OUTPUT}"
                echo "prerelease=true" >> "${GITHUB_OUTPUT}"
                echo "latest=false" >> "${GITHUB_OUTPUT}"
                ;;
              *)
                echo "Publishing is allowed only from main or develop." >&2
                exit 1
                ;;
            esac
          }

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "expected_version=" >> "${GITHUB_OUTPUT}"
            echo "release_title=" >> "${GITHUB_OUTPUT}"
            set_publish_target "${GITHUB_REF_NAME}"
            exit 0
          fi

          TAG_NAME="${GITHUB_REF_NAME}"
          EXPECTED_VERSION="${TAG_NAME#v}"
          TAG_COMMIT="$(git rev-list -n 1 "${TAG_NAME}")"

          is_on_main=false
          is_on_develop=false

          if git merge-base --is-ancestor "${TAG_COMMIT}" "origin/main"; then
            is_on_main=true
          fi

          if git merge-base --is-ancestor "${TAG_COMMIT}" "origin/develop"; then
            is_on_develop=true
          fi

          if [[ "${is_on_main}" == "true" ]]; then
            if [[ "${is_on_develop}" == "true" ]]; then
              echo "Tagged commit ${TAG_COMMIT} is reachable from both main and develop. Preferring main publish settings."
            fi
            set_publish_target main
          elif [[ "${is_on_develop}" == "true" ]]; then
            set_publish_target develop
          else
            echo "Tagged commit ${TAG_COMMIT} is not contained in main/develop." >&2
            exit 1
          fi

          echo "expected_version=${EXPECTED_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_title=ResolutionGuard.NuGet ${EXPECTED_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate release tag format
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use the format v<major>.<minor>.<patch>." >&2
            exit 1
          fi

      - name: Validate release tag is annotated
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          tag_ref="refs/tags/${GITHUB_REF_NAME}"
          git fetch origin "${tag_ref}:${tag_ref}" --force
          object_type="$(git cat-file -t "${tag_ref}")"
          if [[ "${object_type}" != "tag" ]]; then
            echo "Release tags must be annotated tags." >&2
            exit 1
          fi

      - name: Pack
        run: |
          # Ignore generated outputs so RelaxVersioner resolves the tagged version deterministically.
          dotnet pack src/ResolutionGuard.NuGet.Package/ResolutionGuard.NuGet.Package.csproj \
            -c Release \
            --no-restore \
            -p:RelaxVersionerCheckWorkingDirectoryStatus=false \
            -o artifacts

      - name: Verify version resolved from tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ steps.publish_settings.outputs.expected_version }}"
          package_path="artifacts/ResolutionGuard.NuGet.${expected}.nupkg"
          if [[ ! -f "${package_path}" ]]; then
            echo "Expected package not found: ${package_path}" >&2
            ls -la artifacts >&2 || true
            exit 1
          fi

      - name: Verify packaged SBOM
        shell: bash
        run: |
          set -euo pipefail
          package_path="$(find artifacts -maxdepth 1 -name 'ResolutionGuard.NuGet.*.nupkg' | head -n 1)"
          if [[ -z "${package_path}" ]]; then
            echo "Packed NuGet artifact not found." >&2
            exit 1
          fi

          python - "${package_path}" <<'PY'
          import json
          import sys
          import zipfile

          package_path = sys.argv[1]
          entry_name = "sbom/ResolutionGuard.NuGet.spdx.json"

          with zipfile.ZipFile(package_path) as archive:
              if entry_name not in archive.namelist():
                  raise SystemExit(f"Missing bundled SBOM entry: {entry_name}")

              with archive.open(entry_name) as sbom_file:
                  sbom = json.load(sbom_file)

          if not sbom.get("SPDXID"):
              raise SystemExit("Bundled SBOM is missing SPDXID metadata.")
          PY

      - name: Extract release notes from changelog
        if: github.event_name == 'push' && steps.publish_settings.outputs.target == 'nuget.org'
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.publish_settings.outputs.expected_version }}"
          notes_file="${RUNNER_TEMP}/release-notes-${version}.md"

          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\]" { in_section=1; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
          ' CHANGELOG.md > "${notes_file}"

          if ! grep -q '[^[:space:]]' "${notes_file}"; then
            echo "No changelog section found for version ${version} in CHANGELOG.md." >&2
            exit 1
          fi

          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Authenticate to publish target (Trusted Publishing)
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}
          audience: ${{ steps.publish_settings.outputs.audience }}
          token-service-url: ${{ steps.publish_settings.outputs.token_service_url }}

      - name: Push package
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --source "${{ steps.publish_settings.outputs.source }}" \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Create or update GitHub Release
        if: github.event_name == 'push' && steps.publish_settings.outputs.target == 'nuget.org'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="${{ steps.publish_settings.outputs.release_title }}"
          notes_file="${{ steps.release_notes.outputs.notes_file }}"
          prerelease="${{ steps.publish_settings.outputs.prerelease }}"
          latest="${{ steps.publish_settings.outputs.latest }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            cmd=(gh release edit "${tag}" --title "${title}" --notes-file "${notes_file}")
            if [[ "${prerelease}" == "true" ]]; then
              cmd+=(--prerelease)
            elif [[ "${latest}" == "true" ]]; then
              cmd+=(--latest)
            fi
            "${cmd[@]}"
            exit 0
          fi

          cmd=(gh release create "${tag}" --verify-tag --title "${title}" --notes-file "${notes_file}")
          if [[ "${prerelease}" == "true" ]]; then
            cmd+=(--prerelease --latest=false)
          elif [[ "${latest}" == "true" ]]; then
            cmd+=(--latest)
          fi
          "${cmd[@]}"
