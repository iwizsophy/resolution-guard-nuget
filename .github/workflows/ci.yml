name: ci

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore ResolutionGuard.NuGet.slnx

      - name: Build
        run: dotnet build ResolutionGuard.NuGet.slnx -c Release --no-restore

      - name: Run smoke tests
        run: dotnet run --project tests/ResolutionGuard.NuGet.Tests/ResolutionGuard.NuGet.Tests.csproj -c Release --framework net10.0 --no-build

  validate-sdk-hosts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk_version: 8.0.x
            test_framework: net8.0
          - sdk_version: 9.0.x
            test_framework: net9.0
          - sdk_version: 10.0.x
            test_framework: net10.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.sdk_version }}

      - name: Run targeted smoke tests
        run: dotnet run --project tests/ResolutionGuard.NuGet.Tests/ResolutionGuard.NuGet.Tests.csproj -c Release --framework ${{ matrix.test_framework }} -p:ResolutionGuardTestTargetFrameworks=${{ matrix.test_framework }}

  pack:
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - validate-sdk-hosts

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore ResolutionGuard.NuGet.slnx

      - name: Pack
        run: dotnet pack src/ResolutionGuard.NuGet.Package/ResolutionGuard.NuGet.Package.csproj -c Release --no-restore -o artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
